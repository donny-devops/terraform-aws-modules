name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.7.5"

jobs:
  fmt-validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [vpc, ecs, rds]

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check — ${{ matrix.module }}
        run: terraform fmt -check -recursive modules/${{ matrix.module }}

      - name: Terraform init — ${{ matrix.module }}
        run: terraform init -backend=false
        working-directory: modules/${{ matrix.module }}

      - name: Terraform validate — ${{ matrix.module }}
        run: terraform validate
        working-directory: modules/${{ matrix.module }}

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.51.1

      - name: Run TFLint
        run: tflint --recursive

  security-scan:
    name: Security Scan (tfsec + checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

      - name: Install checkov
        run: pip install checkov

      - name: checkov
        run: |
          checkov -d . \
            --framework terraform \
            --compact \
            --quiet \
            --skip-check CKV_AWS_18,CKV_AWS_144

  plan-example:
    name: Plan — Complete Example
    runs-on: ubuntu-latest
    needs: [fmt-validate, tflint, security-scan]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    env:
      TF_VAR_db_password: "ci-placeholder-not-deployed"
      TF_VAR_flask_secret_key: "ci-placeholder-not-deployed"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: examples/complete

      - name: Terraform plan
        run: terraform plan -no-color 2>&1 | head -100
        working-directory: examples/complete
        continue-on-error: true
